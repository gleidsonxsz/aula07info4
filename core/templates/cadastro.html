{% extends 'base.html' %}
{% load static %}

{% block estilo %}
<link rel="stylesheet" href="{% static 'assets/css/cadastro.css' %} ">
{% endblock %}

{% block conteudo %}
  <main>
    <div class="cadastro-card">
      <h1>Criar Conta</h1>

      <form>
        <div class="form-row">
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="João" required>
          </div>
          <div class="form-group">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" placeholder="Silva" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="username">Nome de usuário</label>
            <input type="text" id="username" placeholder="joaosilva" required>
          </div>
          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="confirma">Confirmação de senha</label>
            <input type="password" id="confirma" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Criar conta</button>
      </form>

      <p class="login-link">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </main>
{% endblock %}
